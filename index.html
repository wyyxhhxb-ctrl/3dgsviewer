<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>3DGS 查看器</title>
    <style>
        body {
            margin: 0;
            padding: 5px;
            overflow: hidden;
            background-color: #2b2b2b;
            font-family: Arial, sans-serif;
            color: #ffffff;
            height: calc(100vh - 10px);
        }

        #container {
            width: 100%;
            height: 100%;
            position: relative;
            border-radius: 8px;
            box-sizing: border-box;
        }

        #infoOverlay {
            position: absolute;
            top: 40px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 10px;
            border-radius: 5px;
            z-index: 10;
            pointer-events: none;
            font-size: 14px;
        }

        #loadingIndicator {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            z-index: 5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        #errorDisplay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #ff5555;
            z-index: 6;
            display: none;
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 8px;
        }

        #controlsHelp {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px 12px;
            border-radius: 5px;
            z-index: 10;
            pointer-events: none;
            font-size: 12px;
            line-height: 1.4;
        }

        #controlsHelp p {
            margin: 0.2em 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>

    <script src='https://unpkg.com/three@0.160.0/build/three.min.js'></script>
    <script src='https://unpkg.com/potree@1.8.1/build/Potree.js'></script>
    <link rel="stylesheet" href="https://unpkg.com/potree@1.8.1/build/potree.css">
</head>
<body>
    <div id="container">
        <div id="loadingIndicator">
            <p>正在加载点云...</p>
            <p id="progressText">进度: 0%</p>
        </div>
        <div id="errorDisplay"></div>
        <div id="infoOverlay">
            <p id="pointCountInfo">点数: -</p>
            <p id="boundsInfo">边界: -, -, -</p>
        </div>
        <div id="controlsHelp">
            <p><strong>操作说明:</strong></p>
            <p>· 拖动旋转视角</p>
            <p>· 滚轮缩放</p>
            <p>· 右键拖动平移</p>
        </div>
    </div>

    <script type="module">
        import { initPotreeViewer } from 'https://esm.run/potree@1.8.1/viewer/index.mjs';

        // 将所有逻辑放入 IIFE（立即执行函数），避免顶层 return
        (async () => {
            const container = document.getElementById('container');
            const loadingIndicator = document.getElementById('loadingIndicator');
            const progressText = document.getElementById('progressText');
            const errorDisplay = document.getElementById('errorDisplay');
            const pointCountInfo = document.getElementById('pointCountInfo');
            const boundsInfo = document.getElementById('boundsInfo');

            function showError(message) {
                errorDisplay.textContent = message;
                errorDisplay.style.display = 'block';
                loadingIndicator.style.display = 'none';
            }

            // 获取 URL 参数
            const urlParams = new URLSearchParams(window.location.search);
            const plyUrl = urlParams.get('ply');

            if (!plyUrl) {
                showError("错误：未提供 PLY 文件 URL。请使用 ?ply=YOUR_URL");
                return; // ✅ 现在在函数内，合法！
            }

            // 验证 URL 格式
            try {
                new URL(plyUrl);
            } catch (e) {
                showError("错误：PLY URL 格式无效");
                return;
            }

            try {
                const viewer = await initPotreeViewer({
                    container,
                    useCompatibilityRenderer: true,
                    onProgress: (promises) => {
                        Promise.allSettled(promises).then(results => {
                            const numResolved = results.filter(r => r.status === 'fulfilled').length;
                            const percentage = (numResolved / promises.length * 100).toFixed(1);
                            progressText.textContent = `进度: ${percentage}%`;
                            if (percentage >= 100) {
                                setTimeout(() => {
                                    loadingIndicator.style.display = 'none';
                                }, 500);
                            }
                        });
                    }
                });

                const { pointclouds } = await Potree.loadPointCloud(plyUrl, "loadedCloud", viewer);
                const pointcloud = pointclouds[0];

                if (!pointcloud) {
                    throw new Error("无法加载点云数据");
                }

                viewer.scene.addPointCloud(pointcloud);
                pointcloud.material.pointSizeType = Potree.PointSizeType.ADAPTIVE;
                pointcloud.material.size = 1;
                pointcloud.showBoundingBox = false;
                viewer.fitToScreen();

                // 更新信息面板
                const numPoints = pointcloud.numPoints || pointcloud.geometry.attributes.position.count;
                pointCountInfo.textContent = `点数: ${numPoints?.toLocaleString() || 'N/A'}`;

                const bbox = pointcloud.boundingBox || pointcloud.geometry.boundingBox;
                if (bbox) {
                    boundsInfo.textContent = `边界: Min(${bbox.min.x.toFixed(2)}, ${bbox.min.y.toFixed(2)}, ${bbox.min.z.toFixed(2)}), Max(${bbox.max.x.toFixed(2)}, ${bbox.max.y.toFixed(2)}, ${bbox.max.z.toFixed(2)})`;
                } else {
                    boundsInfo.textContent = '边界: N/A';
                }

            } catch (e) {
                console.error("加载失败:", e);
                showError(`加载失败: ${e.message || '未知错误'}`);
            }
        })();
    </script>
</body>
</html>
