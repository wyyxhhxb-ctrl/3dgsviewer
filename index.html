<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>3D Gaussian Splat 查看器</title>

  <style>
    :root {
      --bg: #181818;
      --bg-soft: #242424;
      --panel: rgba(30, 30, 30, 0.82);
      --panel-border: rgba(255, 255, 255, 0.10);
      --text: #f2f2f2;
      --muted: #a6a6a6;
      --accent: #57a6ff;
      --danger: #ff7777;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 35%, #343434 0%, #202020 42%, #151515 100%);
      font-family:
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        "Microsoft YaHei",
        "PingFang SC",
        Arial,
        sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
      touch-action: none;
    }

    #app-title {
      position: fixed;
      top: max(16px, env(safe-area-inset-top));
      left: max(18px, env(safe-area-inset-left));
      z-index: 10;
      pointer-events: none;
      user-select: none;
    }

    #app-title .name {
      color: var(--text);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.4);
    }

    #app-title .sub {
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.02em;
    }

    #help-panel {
      position: fixed;
      right: max(18px, env(safe-area-inset-right));
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 10;
      min-width: 205px;
      padding: 13px 15px;
      color: var(--muted);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      pointer-events: none;
      user-select: none;
    }

    #help-panel .help-title {
      margin-bottom: 8px;
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
    }

    #help-panel .help-line {
      font-size: 12px;
      line-height: 1.75;
      white-space: nowrap;
    }

    #loading {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 42%, rgba(57, 57, 57, 0.96), rgba(19, 19, 19, 0.98));
    }

    .loading-card {
      width: min(360px, 100%);
      padding: 30px 28px;
      text-align: center;
      background: rgba(31, 31, 31, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 18px;
      box-shadow: 0 18px 55px rgba(0, 0, 0, 0.36);
    }

    .spinner {
      width: 42px;
      height: 42px;
      margin: 0 auto 18px;
      border: 3px solid rgba(255, 255, 255, 0.16);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    #loading-title {
      margin-bottom: 8px;
      font-size: 16px;
      font-weight: 700;
    }

    #loading-label {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      overflow-wrap: anywhere;
    }

    #error {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: var(--text);
      background: rgba(20, 20, 20, 0.96);
    }

    .error-card {
      width: min(580px, 100%);
      padding: 28px;
      background: #272020;
      border: 1px solid rgba(255, 119, 119, 0.3);
      border-radius: 16px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.35);
    }

    .error-title {
      margin-bottom: 12px;
      color: var(--danger);
      font-size: 17px;
      font-weight: 700;
    }

    #error-message {
      color: #dedede;
      font-size: 13px;
      line-height: 1.75;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    .error-tip {
      margin-top: 15px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 620px) {
      #app-title {
        top: max(12px, env(safe-area-inset-top));
        left: max(14px, env(safe-area-inset-left));
      }

      #help-panel {
        right: auto;
        left: max(14px, env(safe-area-inset-left));
        bottom: max(14px, env(safe-area-inset-bottom));
        min-width: 0;
        padding: 10px 12px;
      }

      #help-panel .help-line {
        font-size: 11px;
      }
    }
  </style>
</head>

<body>
  <div id="app-title">
    <div class="name">3D Gaussian Splat 查看器</div>
    <div class="sub" id="model-name">等待加载模型</div>
  </div>

  <div id="help-panel">
    <div class="help-title">操作说明</div>
    <div class="help-line">左键拖动：旋转视角</div>
    <div class="help-line">滚轮 / 双指：缩放</div>
    <div class="help-line">右键拖动：平移视角</div>
  </div>

  <div id="loading">
    <div class="loading-card">
      <div class="spinner"></div>
      <div id="loading-title">正在加载 3DGS 模型</div>
      <div id="loading-label">正在准备查看器…</div>
    </div>
  </div>

  <div id="error">
    <div class="error-card">
      <div class="error-title">无法加载模型</div>
      <div id="error-message"></div>
      <div class="error-tip">
        请确认网址包含 <code>?ply=PLY文件地址</code>，并且 PLY 文件服务器已正确允许跨域访问（CORS）。
      </div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdnjs.cloudflare.com/ajax/libs/three.js/0.180.0/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/",
      "@sparkjsdev/spark": "https://unpkg.com/@sparkjsdev/spark@2.0.0/dist/spark.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";
    import { SparkRenderer, SplatMesh } from "@sparkjsdev/spark";

    const loadingEl = document.getElementById("loading");
    const loadingLabelEl = document.getElementById("loading-label");
    const errorEl = document.getElementById("error");
    const errorMessageEl = document.getElementById("error-message");
    const modelNameEl = document.getElementById("model-name");

    const query = new URLSearchParams(window.location.search);
    const plyURL = query.get("ply");

    function showError(message) {
      loadingEl.style.display = "none";
      errorMessageEl.textContent = message;
      errorEl.style.display = "flex";
    }

    function hideLoading() {
      loadingEl.style.display = "none";
    }

    function getFileName(url) {
      try {
        const parsed = new URL(url, window.location.href);
        const name = decodeURIComponent(parsed.pathname.split("/").pop() || "");
        return name || "已加载 3DGS 模型";
      } catch {
        return "已加载 3DGS 模型";
      }
    }

    if (!plyURL) {
      showError(
        "未检测到 PLY 文件地址。\n\n" +
        "请在网址后添加参数，例如：\n" +
        "?ply=https%3A%2F%2Fexample.com%2Fmodel.ply"
      );
    } else {
      modelNameEl.textContent = getFileName(plyURL);
      initViewer(plyURL);
    }

    function initViewer(url) {
      const scene = new THREE.Scene();

      const camera = new THREE.PerspectiveCamera(
        45,
        window.innerWidth / window.innerHeight,
        0.01,
        1000
      );
      camera.position.set(0, 0.3, 1.8);

      const renderer = new THREE.WebGLRenderer({
        antialias: false,
        alpha: false,
        powerPreference: "high-performance"
      });

      renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setClearColor(0x1b1b1b, 1);
      renderer.domElement.setAttribute("aria-label", "3D Gaussian Splat 模型查看区域");
      document.body.appendChild(renderer.domElement);

      const sparkRenderer = new SparkRenderer({ renderer });
      scene.add(sparkRenderer);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.075;
      controls.enablePan = true;
      controls.screenSpacePanning = true;
      controls.minDistance = 0.08;
      controls.maxDistance = 100;
      controls.target.set(0, 0, 0);

      controls.mouseButtons = {
        LEFT: THREE.MOUSE.ROTATE,
        MIDDLE: THREE.MOUSE.DOLLY,
        RIGHT: THREE.MOUSE.PAN
      };

      controls.touches = {
        ONE: THREE.TOUCH.ROTATE,
        TWO: THREE.TOUCH.DOLLY_PAN
      };

      renderer.domElement.addEventListener("contextmenu", (event) => {
        event.preventDefault();
      });

      loadingLabelEl.textContent = "正在请求 PLY 文件…";

      const splat = new SplatMesh({ url });
      const splatRoot = new THREE.Group();

      splatRoot.add(splat);

      /*
        保留原查看器的 DEG PLY 方向兼容逻辑：
        先绕 Y 轴旋转，再绕 X 轴翻转，使模型以 Three.js 的 +Y 为上方显示。
      */
      splat.rotation.y = Math.PI / 2;
      splatRoot.rotation.x = Math.PI;

      scene.add(splatRoot);

      let loadingHidden = false;
      let boundingBoxAttempts = 0;

      function finishLoading() {
        if (loadingHidden) return;
        loadingHidden = true;
        hideLoading();
      }

      function tryFrameModel() {
        if (loadingHidden) return;

        boundingBoxAttempts++;

        try {
          const box = new THREE.Box3().setFromObject(splatRoot);

          if (!box.isEmpty() && Number.isFinite(box.min.x)) {
            const center = new THREE.Vector3();
            const size = new THREE.Vector3();

            box.getCenter(center);
            box.getSize(size);

            const maxDimension = Math.max(size.x, size.y, size.z);

            if (Number.isFinite(maxDimension) && maxDimension > 0) {
              const fitDistance = Math.max(maxDimension * 1.3, 0.7);

              camera.position.copy(center).add(
                new THREE.Vector3(
                  0,
                  Math.max(maxDimension * 0.12, 0.1),
                  fitDistance
                )
              );

              controls.target.copy(center);
              controls.update();
            }

            finishLoading();
            return;
          }
        } catch {
          // Spark 数据尚未完全可用时，继续在后续帧重试。
        }

        if (boundingBoxAttempts > 120) {
          finishLoading();
        }
      }

      fetch(url, { method: "HEAD", mode: "cors" })
        .then((response) => {
          if (!response.ok) {
            throw new Error(`HTTP ${response.status} ${response.statusText}`);
          }

          const length = response.headers.get("content-length");

          if (length) {
            const sizeMB = Number(length) / 1024 / 1024;
            loadingLabelEl.textContent =
              `正在加载模型数据（${sizeMB.toFixed(1)} MB）…`;
          } else {
            loadingLabelEl.textContent = "正在加载模型数据…";
          }
        })
        .catch(() => {
          /*
            有些对象存储或 GitHub Raw 地址不允许 HEAD 请求，
            但 GET 仍可能正常。因此这里不直接中断加载。
          */
          loadingLabelEl.textContent = "正在加载模型数据…";
        });

      window.addEventListener("resize", () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();

        renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
        renderer.setSize(window.innerWidth, window.innerHeight);
      });

      window.addEventListener("error", (event) => {
        const message = event?.message || "";

        if (
          message.includes("fetch") ||
          message.includes("Network") ||
          message.includes("CORS")
        ) {
          showError(
            "模型文件请求失败。\n\n" +
            "可能原因：\n" +
            "1. PLY 地址不可访问；\n" +
            "2. 文件服务器未配置 CORS；\n" +
            "3. 文件格式不是 Spark 支持的 Gaussian Splat PLY。"
          );
        }
      });

      renderer.setAnimationLoop(() => {
        controls.update();
        renderer.render(scene, camera);
        tryFrameModel();
      });

      /*
        若模型正在后台解析但包围盒尚不可用，避免加载层永久停留。
      */
      window.setTimeout(() => {
        finishLoading();
      }, 8000);
    }
  </script>
</body>
</html>
