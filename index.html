<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3DGS 查看器</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            font-family: Arial, sans-serif;
            color: white;
        }
        #container {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        #infoPanel {
            position: absolute;
            top: 40px;
            left: 10px;
            padding: 10px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
            font-size: 14px;
            z-index: 100;
        }
        #loadingMessage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            z-index: 200;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
        }
        #controlsInfo {
            position: absolute;
            bottom: 10px;
            left: 10px;
            padding: 8px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
        }
        #errorPanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            z-index: 200;
            background-color: rgba(139, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            display: none;
        }
        #pointcloudCounter {
            position: absolute;
            bottom: 10px;
            right: 10px;
            padding: 8px;
            background-color: rgba(0, 0, 0, 0.7);
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div id="infoPanel" style="display:none;">
        <p><strong>文件:</strong> <span id="fileName">-</span></p>
        <p><strong>点数:</strong> <span id="numPoints">-</span></p>
    </div>

    <div id="loadingMessage">3DGS 查看器正在加载点云...</div>

    <div id="errorPanel">
        <p>加载失败或不支持的文件格式。</p>
        <p id="errorMessageText">-</p>
    </div>

    <div id="controlsInfo">
        <p>左键拖拽旋转 · 滚轮缩放 · 右键拖拽平移</p>
    </div>

    <div id="pointcloudCounter">
        点云数量: <span id="pointCountDisplay">0</span>
    </div>

    <!-- 加载 Three.js 核心 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
    <!-- 加载 OrbitControls -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- 加载 PLYLoader（关键！必须显式加载） -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/PLYLoader.js"></script>

    <script>
        // --- 获取URL参数 ---
        const urlParams = new URLSearchParams(window.location.search);
        let plyUrl = urlParams.get('ply');

        // --- DOM 元素引用 ---
        const container = document.getElementById('container');
        const loadingMessage = document.getElementById('loadingMessage');
        const errorPanel = document.getElementById('errorPanel');
        const errorMessageText = document.getElementById('errorMessageText');
        const infoPanel = document.getElementById('infoPanel');
        const fileNameSpan = document.getElementById('fileName');
        const numPointsSpan = document.getElementById('numPoints');
        const pointCountDisplay = document.getElementById('pointCountDisplay');

        // --- Three.js 初始化 ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 5);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = false;
        controls.minDistance = 0.1;
        controls.maxDistance = 1000;

        // --- 光照 ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
        directionalLight.position.set(1, 1, 1).normalize();
        scene.add(directionalLight);

        // --- 渲染循环 ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        // --- 响应窗口大小变化 ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 加载 PLY 文件 ---
        function loadPLY(url) {
            if (!url) {
                showError("未提供 PLY 文件 URL。请使用 ?ply=your_ply_file_url 参数。");
                return;
            }

            fileNameSpan.textContent = url.split('/').pop().split('?')[0] || 'Unknown';

            const loader = new THREE.PLYLoader();
            loader.load(
                url,
                (geometry) => {
                    loadingMessage.style.display = 'none';
                    infoPanel.style.display = 'block';

                    const numPoints = geometry.attributes.position.count;
                    numPointsSpan.textContent = numPoints.toLocaleString();
                    pointCountDisplay.textContent = numPoints.toLocaleString();

                    // 材质：支持颜色或默认灰
                    const material = geometry.attributes.color
                        ? new THREE.PointsMaterial({ size: 0.01, vertexColors: true, sizeAttenuation: true })
                        : new THREE.PointsMaterial({ size: 0.01, color: 0xdddddd, sizeAttenuation: true });

                    const pointCloud = new THREE.Points(geometry, material);
                    scene.add(pointCloud);

                    // 自动聚焦
                    geometry.computeBoundingBox();
                    const bbox = geometry.boundingBox;
                    const center = bbox.getCenter(new THREE.Vector3());
                    const size = bbox.getSize(new THREE.Vector3()).length();

                    camera.position.copy(center);
                    camera.position.x += size * 1.5;
                    camera.position.y += size * 0.5;
                    camera.position.z += size * 1.5;
                    camera.lookAt(center);

                    controls.target.copy(center);
                    controls.update();
                },
                undefined, // onProgress
                (error) => {
                    console.error('PLY 加载失败:', error);
                    showError(`加载失败: ${error.message || '未知错误'}`);
                }
            );
        }

        function showError(message) {
            loadingMessage.style.display = 'none';
            errorMessageText.textContent = message;
            errorPanel.style.display = 'block';
        }

        // 启动
        loadPLY(plyUrl);
        animate();
    </script>
</body>
</html>
